services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace-backend
    ports:
      - '127.0.0.1:3001:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3001/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://127.0.0.1:3000
      EXTERNAL_API_URL: https://dummyjson.com
      EXTERNAL_API_TIMEOUT: 5000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketplace-frontend
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
      API_URL: http://backend:3001/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
